name = "lint"
builtinLint = false
defaultTargets = ["Main", "Clean", "Linters", "ExtraViolations", "TextLints"]

[[require]]
name = "dep"
path = "dep"

[[lean_lib]]
name = "Main"
globs = "Main.*"

[[lean_lib]]
name = "Clean"

[[lean_lib]]
name = "Linters"

[[lean_lib]]
name = "ExtraViolations"

[[lean_lib]]
name = "TextLints"
