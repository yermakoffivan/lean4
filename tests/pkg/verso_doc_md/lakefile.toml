name = "verso_doc_md"
defaultTargets = ["VersoDocMd", "VersoDocMdTest", "VersoDocMdTestImportAll"]

# Defines a docstring role and its Markdown renderer (`Defs`), a declaration whose docstring is the
# inclusion target (`A`), and a declaration whose docstring includes it via the custom role (`B`).
[[lean_lib]]
name = "VersoDocMd"
roots = ["VersoDocMd.Defs", "VersoDocMd.A", "VersoDocMd.B"]

# Renders the including docstring. `Elab.inServer` makes the server-level docstrings of imported
# modules available, as in an interactive session.
[[lean_lib]]
name = "VersoDocMdTest"
leanOptions = { Elab.inServer = true }
roots = ["VersoDocMd.C"]

# Includes an `import all`'d declaration's docstring through a role that reads it straight from the
# environment as it elaborates. The target is reached through `import all` instead of `Elab.inServer`.
[[lean_lib]]
name = "VersoDocMdTestImportAll"
roots = ["VersoDocMd.D"]
